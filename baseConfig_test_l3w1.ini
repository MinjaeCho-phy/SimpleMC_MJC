
# Smoke test for DFT_l3w1 under the new DFT_fix.py.
# Lightweight nested settings — finishes much faster than production runs
# but still exercises the sampler / likelihood / cosmology code paths
# where the old DFT_fix used to crash.

[custom]
chainsdir = simplemc/chains_test

;DFT_l3w1: l = 3w - 1, OL=0. Free: h, Ok, Oh, Oe, w, alpha_fsc.
model = DFT_l0

prefact = phy
varys8  = False

;Same datasets as baseConfig2.ini's DFT run, so the test exercises
;the same likelihood path the production run will use.
datasets = HD+Union3+FSC

analyzername = nested

addDerived = False
mcevidence = False
mcevidence_k = 2

;Separate chainsdir (chains_test) so this won't collide with real runs.
overwrite = True

getdist = False
corner = False
simpleplot = False
showfig = False

useNeuralLike = False


[mcmc]
nsamp   = 500000
skip    = 500
temp    = 2
GRstop  = 0.01
checkGR = 500
chainno = 4


[nested]
nestedType = multi

;Reduced from production 1024 -> 100 for a fast smoke test.
;ndim = 6 here, so 100 is well below the recommended 50*ndim=300
;but that's the point: just check it runs to completion.
nlivepoints = 100

;Loose stopping criterion — production uses 0.01.
accuracy = 0.5

priortype = u
sigma = 2

;1 process for cleaner stdout while testing.
nproc = 0

showfiles = True
dynamic = False
neuralNetwork = False


[neural]
split = 0.8
learner = keras
numNeurons = 50
epochs = 100
dlogz_start = 5
it_to_start_net = 10000
proxy_tolerance = 0.3

[neuralike]
ndivsgrid = 4
epochs = 500
learning_rate = 1e-5
batch_size = 16
psplit = 0.8
hidden_layers_neurons = 100, 100, 100
nproc = 5

[emcee]
walkers = 10
nsamp = 200
burnin = 0
nproc = 4

[maxlike]
compute_errors = False
show_contours = False
plot_param1 = h
plot_param2 = Om
compute_derived = True

[ga_deap]
population = 20
crossover = 0.7
mutation = 0.3
max_generation = 50
hof_size = 1
crowding_factor = 1
plot_fitness = True
compute_errors = True
show_contours = True
plot_param1 = h
plot_param2 = Om
